<title> Register | Comic Boy Inc. </title>


<body>
       <script src="script.js"></script>

<h1 class="login-word">
Create an Account
</h1>
<div class="login-container">

<div class="input-box">
    <input type="text" placeholder="First Name" id="first-name"required>
</div>

<div class="input-box">
    <input type="text" placeholder="Middle Name (Optional)" id="middle-name"required>
</div>

<div class="input-box">
    <input type="text" placeholder="Last Name" id="last-name"required>
</div>


<div class="input-box">
    <input type="email" placeholder="Email Address"  id="email-input" required>
    <i class='bx bxs-face'></i>
</div>

<div class="input-box">
    <input type="password" placeholder="Create Password"  id="password-input" required>
    <i class='bx bxs-lock'></i>
</div>

<div class="input-box">
    <input type="password" placeholder="Re-type Password"  id="password-input" required>
    <i class='bx bxs-lock'></i>
</div>


<div class="remember-forgot">
 <label><input type="checkbox" id="checkbox">Remember Me</label>
 <a href="">Forgot password?</a>
</div>

<button type="submit" id="submit-button">Sign In</button>

<div class="register-link">
 <p>Already have an account?
 <a href="login.html">Login</a></p>   
</div>
</div>

<p class="message" id="message"></p>

<footer class="footer">
    <h3>For more, please sign in and register for more content awaiting</h3>
    <p>Copyright @ Comic Boy Inc. 2026</p>
    </footer>
    
</body>
